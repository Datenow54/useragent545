<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Master UA - 100% Real Engine</title>
    <style>
        :root { --gh-dark: #0d1117; --gh-card: #161b22; --gh-blue: #2f81f7; --gh-green: #238636; --gh-border: #30363d; --gh-text: #e6edf3; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gh-dark); color: var(--gh-text); margin: 0; }
        
        /* Auth UI */
        #auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: var(--gh-card); padding: 40px; border-radius: 12px; border: 1px solid var(--gh-border); width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { color: var(--gh-blue); margin-bottom: 25px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; background: #010409; border: 1px solid var(--gh-border); color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: var(--gh-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-green { width: 100%; padding: 12px; background: var(--gh-green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Main UI */
        #app-container { display: none; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--gh-card); border-bottom: 1px solid var(--gh-border); }
        .main-grid { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 25px; }
        .panel { background: var(--gh-card); border: 1px solid var(--gh-border); border-radius: 10px; padding: 25px; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; }
        select, input[type="text"] { width: 100%; padding: 12px; background: #010409; color: white; border: 1px solid var(--gh-border); border-radius: 6px; }
        
        .output-box { background: #000; border: 1px solid var(--gh-border); padding: 20px; border-radius: 8px; position: relative; min-height: 100px; margin-top: 20px; }
        #ua-display { font-family: 'Consolas', monospace; font-size: 13px; color: #79c0ff; word-break: break-all; line-height: 1.6; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--gh-blue); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        /* History Table */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        .history-table th, .history-table td { border: 1px solid var(--gh-border); padding: 12px; text-align: left; }
        .history-table th { background: #21262d; }
        #search { margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-container">
        <div class="auth-card">
            <h2>Elite UA Login</h2>
            <input type="text" id="user-name" placeholder="Username">
            <input type="password" id="user-pass" placeholder="Password">
            <button class="btn-blue" onclick="auth('login')">Login</button>
            <button class="btn-green" onclick="auth('signup')">Sign Up</button>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-container">
        <div class="header">
            <div style="font-size: 20px; font-weight: bold;">Elite Master UA Generator</div>
            <div>
                <span id="display-name" style="margin-right: 15px;"></span>
                <button onclick="logout()" style="background: #f85149; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Logout</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- Settings Panel -->
            <div class="panel">
                <div class="field">
                    <label>Social Platform</label>
                    <select id="platform">
                        <option value="CHROME">Chrome (Real Engine 133-146)</option>
                        <option value="FIREFOX">Firefox (Stable 133-143)</option>
                        <option value="FACEBOOK">Facebook App (100% Real)</option>
                        <option value="INSTAGRAM">Instagram App (Real Scale)</option>
                        <option value="TIKTOK">TikTok (Global Build)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Device Category</label>
                    <select id="deviceCat">
                        <option value="MOBILE">Mobile (All Android Brands)</option>
                        <option value="IOS">Apple (iPhone/iPad)</option>
                        <option value="WINDOWS">Windows (8.1, 10, 11)</option>
                    </select>
                </div>
                <button class="btn-green" style="font-size: 16px; padding: 15px;" onclick="generateUniqueUA()">GENERATE UNIQUE UA</button>
                
                <div class="output-box">
                    <button class="copy-btn" onclick="copyUA()">COPY</button>
                    <div id="ua-display">UA will appear here...</div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="panel">
                <label>Search History</label>
                <input type="text" id="search" placeholder="Search by brand or version..." onkeyup="loadHistory()">
                <div style="max-height: 500px; overflow-y: auto; margin-top: 15px;">
                    <table class="history-table">
                        <thead>
                            <tr><th>Platform</th><th>User-Agent</th></tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- REAL DEVICE DATA POOL ---
    const androidPool = [
        { brand: "Samsung", model: "SM-S928B", name: "S24 Ultra", os: "14", build: "UP1A.231005.007", scale: "3.0" },
        { brand: "Samsung", model: "SM-S938B", name: "S25 Ultra", os: "15", build: "VP1A.241005.001", scale: "3.0" },
        { brand: "Xiaomi", model: "23127PN0CC", name: "Xiaomi 14 Pro", os: "14", build: "UKQ1.230804.001", scale: "3.0" },
        { brand: "Google", model: "Pixel 9 Pro", name: "Pixel 9 Pro", os: "15", build: "AD1A.240511.001", scale: "3.5" },
        { brand: "OnePlus", model: "CPH2581", name: "OnePlus 12", os: "14", build: "UKQ1.230917.001", scale: "3.0" },
        { brand: "Vivo", model: "V2303", name: "Vivo V29", os: "13", build: "TP1A.220624.014", scale: "2.7" }
    ];

    const iosPool = [
        { model: "iPhone16,2", name: "iPhone 15 Pro Max", os: "17.4", build: "21E219" },
        { model: "iPhone17,1", name: "iPhone 16 Pro Max", os: "18.1", build: "22A345" },
        { model: "iPhone18,2", name: "iPhone 17 Ultra", os: "19.0", build: "23A567" }
    ];

    const winPool = [
        { name: "Windows 8.1", nt: "Windows NT 6.3" },
        { name: "Windows 10", nt: "Windows NT 10.0" },
        { name: "Windows 11", nt: "Windows NT 10.0" }
    ];

    const carriers = [
        {c: "Grameenphone", l: "bn_BD"}, {c: "Verizon", l: "en_US"}, 
        {c: "Jio", l: "hi_IN"}, {c: "Airtel", l: "en_IN"},
        {c: "T-Mobile", l: "de_DE"}, {c: "Orange", l: "fr_FR"}
    ];

    // --- AUTH & DATA LOGIC ---
    let activeUser = null;

    function auth(type) {
        const u = document.getElementById('user-name').value;
        const p = document.getElementById('user-pass').value;
        if(!u || !p) return alert("Fill fields!");

        let users = JSON.parse(localStorage.getItem('ua_db') || '{}');

        if(type === 'signup') {
            if(users[u]) return alert("Exists!");
            users[u] = { pass: p, history: [] };
            localStorage.setItem('ua_db', JSON.stringify(users));
            alert("Success! Now Login.");
        } else {
            if(users[u] && users[u].pass === p) {
                activeUser = u;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('display-name').innerText = "User: " + u;
                loadHistory();
            } else { alert("Wrong credentials!"); }
        }
    }

    function logout() { location.reload(); }

    function generateUniqueUA() {
        const plat = document.getElementById('platform').value;
        const cat = document.getElementById('deviceCat').value;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        let ua = "";
        
        // --- REAL VERSIONS LOGIC (AS PER REQUEST) ---
        const chromeVer = `${rand(133, 146)}.0.${rand(6000, 7000)}.${rand(10, 180)}`;
        const firefoxVer = `${rand(133, 143)}.0`;
        
        const fbVer = `${rand(480, 530)}.0.0.${rand(30, 99)}.${rand(100, 200)}`;
        const fbbv = rand(580000000, 690000000);
        const carrier = carriers[rand(0, carriers.length - 1)];

        if (cat === "MOBILE") {
            const dev = androidPool[rand(0, androidPool.length - 1)];
            if (plat === "CHROME") {
                ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Mobile Safari/537.36`;
            } else if (plat === "FIREFOX") {
                ua = `Mozilla/5.0 (Android ${dev.os}; Mobile; rv:${firefoxVer}) Gecko/${firefoxVer} Firefox/${firefoxVer}`;
            } else if (plat === "FACEBOOK") {
                ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model} Build/${dev.build}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${chromeVer} Mobile Safari/537.36 [FBAN/FB4A;FBAV/${fbVer};FBBV/${fbbv};FBDV/${dev.model};FBMD/${dev.brand};FBSN/Android;FBSV/${dev.os};FBSS/${dev.scale};FBCR/${carrier.c};FBLC/${carrier.l};FBOP/19;FBRV/${fbbv+rand(1,5000)}]`;
            } else if (plat === "INSTAGRAM") {
                ua = `Instagram ${rand(320, 360)}.0.0.0.0 (${dev.model}; ${dev.os}; ${carrier.l}; en-US; scale=${dev.scale}; 1179x2556; ${fbbv})`;
            } else if (plat === "TIKTOK") {
                ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Mobile Safari/537.36 TikTok/${rand(33, 40)}.0.0`;
            }
        } else if (cat === "IOS") {
            const dev = iosPool[rand(0, iosPool.length - 1)];
            if (plat === "FACEBOOK") {
                ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${dev.os.replace('.','_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${dev.build} [FBAN/FBIOS;FBAV/${fbVer};FBBV/${fbbv};FBDV/${dev.model};FBMD/iPhone;FBSN/iOS;FBSV/${dev.os};FBSS/3;FBCR/${carrier.c};FBLC/${carrier.l};FBOP/5;FBRV/${fbbv+rand(1,5000)}]`;
            } else if (plat === "FIREFOX") {
                ua = `Mozilla/5.0 (iPhone; CPU OS ${dev.os.replace('.','_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${firefoxVer} Mobile/15E148 Safari/605.1.15`;
            } else {
                ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${dev.os.replace('.','_')} like Mac OS X) AppleWebKit/537.36 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1 Chrome/${chromeVer}`;
            }
        } else {
            const dev = winPool[rand(0, winPool.length - 1)];
            if (plat === "FIREFOX") {
                ua = `Mozilla/5.0 (${dev.nt}; Win64; x64; rv:${firefoxVer}) Gecko/20100101 Firefox/${firefoxVer}`;
            } else {
                ua = `Mozilla/5.0 (${dev.nt}; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Safari/537.36`;
            }
        }

        document.getElementById('ua-display').innerText = ua;
        saveUA(ua, plat);
    }

    function saveUA(ua, platform) {
        let db = JSON.parse(localStorage.getItem('ua_db'));
        if(!db[activeUser].history.some(item => item.ua === ua)) {
            db[activeUser].history.unshift({ platform, ua });
            localStorage.setItem('ua_db', JSON.stringify(db));
            loadHistory();
        }
    }

    function loadHistory() {
        let db = JSON.parse(localStorage.getItem('ua_db'));
        if(!db || !activeUser || !db[activeUser]) return;
        const query = document.getElementById('search').value.toLowerCase();
        const body = document.getElementById('history-body');
        body.innerHTML = "";
        
        db[activeUser].history.filter(i => i.ua.toLowerCase().includes(query)).forEach(i => {
            body.innerHTML += `<tr><td>${i.platform}</td><td style="word-break:break-all">${i.ua}</td></tr>`;
        });
    }

    function copyUA() {
        const t = document.getElementById('ua-display').innerText;
        navigator.clipboard.writeText(t);
        alert("100% Real UA (v.133-146) Copied!");
    }
</script>
</body>
</html>
