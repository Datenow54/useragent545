<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Elite UA Generator - 100% Real</title>
    <style>
        :root { --primary: #2ea44f; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 6px; color: #8b949e; text-transform: uppercase; }
        select { background: #010409; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 6px; outline: none; cursor: pointer; font-size: 13px; }
        .btn-gen { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-gen:hover { background: #2c974b; transform: scale(1.01); }
        .output-area { margin-top: 25px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; }
        #ua-output { font-family: 'Consolas', monospace; font-size: 13px; color: #79c0ff; word-break: break-all; margin: 0; white-space: pre-wrap; line-height: 1.6; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--blue); border: none; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .footer-info { text-align: center; font-size: 11px; color: #8b949e; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Elite Global UA Generator (Chrome 134-146)</h1>

    <div class="grid">
        <!-- Platform Option -->
        <div class="field">
            <label>Social Platform / Browser</label>
            <select id="platform" onchange="filterDevices()">
                <option value="CHROME_MOB">Chrome Mobile (134-146)</option>
                <option value="CHROME_WIN">Chrome Windows (134-146)</option>
                <option value="FIREFOX_MOB">Firefox Mobile</option>
                <option value="FIREFOX_WIN">Firefox Windows</option>
                <option value="FB_ANDROID">Facebook Android</option>
                <option value="FB_IOS">Facebook iOS</option>
                <option value="INSTAGRAM">Instagram App</option>
                <option value="TIKTOK">TikTok Global</option>
                <option value="REDDIT">Reddit App</option>
            </select>
        </div>

        <!-- Device Option -->
        <div class="field">
            <label>Device Model</label>
            <select id="deviceSelect"></select>
        </div>

        <!-- Carrier Option (All Major Countries) -->
        <div class="field">
            <label>Carrier (Network)</label>
            <select id="carrier">
                <option value="Grameenphone">Grameenphone (BD)</option>
                <option value="Robi">Robi (BD)</option>
                <option value="Banglalink">Banglalink (BD)</option>
                <option value="Verizon">Verizon (USA)</option>
                <option value="AT&T">AT&T (USA)</option>
                <option value="T-Mobile">T-Mobile (USA/DE)</option>
                <option value="Reliance Jio">Jio (India)</option>
                <option value="Airtel">Airtel (India)</option>
                <option value="Vodafone">Vodafone (UK/IN)</option>
                <option value="Orange">Orange (FR)</option>
                <option value="Etisalat">Etisalat (UAE)</option>
                <option value="STC">STC (KSA)</option>
                <option value="Zain">Zain (KWT/SA)</option>
                <option value="Optus">Optus (AUS)</option>
                <option value="Telstra">Telstra (AUS)</option>
            </select>
        </div>

        <!-- Language Option (Global) -->
        <div class="field">
            <label>Language (Locale)</label>
            <select id="language">
                <option value="en_US">English (USA)</option>
                <option value="bn_BD">Bengali (BD)</option>
                <option value="hi_IN">Hindi (India)</option>
                <option value="en_GB">English (UK)</option>
                <option value="ar_SA">Arabic (Saudi)</option>
                <option value="fr_FR">French (France)</option>
                <option value="de_DE">German (Germany)</option>
                <option value="es_ES">Spanish (Spain)</option>
                <option value="pt_BR">Portuguese (Brazil)</option>
                <option value="ru_RU">Russian (Russia)</option>
                <option value="ja_JP">Japanese (Japan)</option>
                <option value="zh_CN">Chinese (China)</option>
            </select>
        </div>
    </div>

    <button class="btn-gen" onclick="generateUA()">GENERATE 100% REAL USER-AGENT</button>

    <div class="output-area">
        <button class="copy-btn" onclick="copyUA()">COPY</button>
        <pre id="ua-output">Ready to generate...</pre>
    </div>

    <div class="footer-info">
        Verified Engine: Chrome 134.x to 146.x | Firefox 125.x | FB v.520.x | Updated 2025-2026
    </div>
</div>

<script>
    const devices = {
        mobile: [
            { name: "Samsung S24 Ultra", model: "SM-S928B", brand: "samsung", build: "UP1A.231005.007", os: "14", scale: "3.0" },
            { name: "Samsung S25 Ultra", model: "SM-S938B", brand: "samsung", build: "VP1A.241005.001", os: "15", scale: "3.0" },
            { name: "iPhone 15 Pro Max", model: "iPhone16,2", brand: "Apple", build: "21E219", os: "17.4" },
            { name: "iPhone 16 Pro Max", model: "iPhone17,1", brand: "Apple", build: "22A345", os: "18.1" },
            { name: "iPhone 17 Ultra (2026)", model: "iPhone18,2", brand: "Apple", build: "23A567", os: "19.0" },
            { name: "Pixel 9 Pro", model: "Pixel 9 Pro", brand: "google", build: "AD1A.240511.001", os: "15", scale: "3.5" }
        ],
        windows: [
            { name: "Windows 11 PC", model: "Windows NT 10.0; Win64; x64" },
            { name: "Windows 10 Pro", model: "Windows NT 10.0; Win64; x64" }
        ]
    };

    function filterDevices() {
        const plat = document.getElementById('platform').value;
        const select = document.getElementById('deviceSelect');
        select.innerHTML = "";
        const type = (plat.includes('WIN')) ? 'windows' : 'mobile';
        devices[type].forEach((d, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = d.name;
            select.appendChild(opt);
        });
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function generateUA() {
        const plat = document.getElementById('platform').value;
        const devIdx = document.getElementById('deviceSelect').value;
        const carrier = document.getElementById('carrier').value;
        const lang = document.getElementById('language').value;
        const dev = (plat.includes('WIN')) ? devices.windows[devIdx] : devices.mobile[devIdx];
        
        // Dynamic Versions
        const chromeVer = `${rand(134, 146)}.0.${rand(6000, 7000)}.${rand(10, 150)}`;
        const ffVer = `${rand(125, 135)}.0`;
        const fbVer = `${rand(480, 530)}.0.0.${rand(30, 99)}.${rand(100, 200)}`;
        const fbbv = rand(580000000, 690000000);
        
        let ua = "";

        if (plat === "CHROME_MOB") {
            ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Mobile Safari/537.36`;
        } 
        else if (plat === "CHROME_WIN") {
            ua = `Mozilla/5.0 (${dev.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Safari/537.36`;
        }
        else if (plat === "FIREFOX_MOB") {
            ua = `Mozilla/5.0 (Android ${dev.os}; Mobile; rv:${ffVer}) Gecko/${ffVer} Firefox/${ffVer}`;
        }
        else if (plat === "FIREFOX_WIN") {
            ua = `Mozilla/5.0 (${dev.model}; rv:${ffVer}) Gecko/20100101 Firefox/${ffVer}`;
        }
        else if (plat === "FB_ANDROID") {
            ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model} Build/${dev.build}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${chromeVer} Mobile Safari/537.36 [FBAN/FB4A;FBAV/${fbVer};FBBV/${fbbv};FBDV/${dev.model};FBMD/${dev.brand};FBSN/Android;FBSV/${dev.os};FBSS/${dev.scale || '3.0'};FBCR/${carrier};FBLC/${lang};FBOP/19;FBRV/${fbbv+rand(100,999)}]`;
        }
        else if (plat === "FB_IOS") {
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${dev.os.replace('.','_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${dev.build} [FBAN/FBIOS;FBAV/${fbVer};FBBV/${fbbv};FBDV/${dev.model};FBMD/iPhone;FBSN/iOS;FBSV/${dev.os};FBSS/3;FBCR/${carrier};FBLC/${lang};FBOP/5;FBRV/${fbbv+rand(100,999)}]`;
        }
        else if (plat === "INSTAGRAM") {
            ua = `Instagram ${rand(320, 360)}.0.0.0.0 (${dev.model}; ${dev.os}; ${lang}; en-US; scale=${dev.scale || '3.0'}; 1179x2556; ${fbbv})`;
        }
        else if (plat === "TIKTOK") {
            ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeVer} Mobile Safari/537.36 TikTok/${rand(33, 40)}.0.0`;
        }
        else if (plat === "REDDIT") {
            ua = `Reddit/${rand(2024, 2026)}.${rand(1, 12)}.0 (Android ${dev.os}; ${dev.model})`;
        }

        document.getElementById('ua-output').innerText = ua;
    }

    function copyUA() {
        const text = document.getElementById('ua-output').innerText;
        navigator.clipboard.writeText(text);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = "COPY", 1500);
    }
    filterDevices();
</script>

</body>
</html>
