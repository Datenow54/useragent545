<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real User-Agent Master Tool</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --green: #238636; --blue: #2f81f7; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--blue); font-size: 22px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 12px; margin-bottom: 5px; color: #8b949e; font-weight: bold; }
        select, input { background: #0d1117; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 6px; outline: none; }
        .btn-box { margin-top: 20px; }
        button { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2ea043; }
        .output-box { margin-top: 25px; background: #010409; border: 1px solid var(--border); padding: 15px; border-radius: 8px; position: relative; min-height: 80px; }
        #ua-display { font-family: monospace; font-size: 13px; color: #79c0ff; word-break: break-all; line-height: 1.5; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--blue); border: none; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .ver-info { font-size: 11px; color: #8b949e; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ Real UA Generator (All Device & Social)</h1>

    <div class="grid">
        <!-- Platform Selection -->
        <div class="group">
            <label>SOCIAL PLATFORM</label>
            <select id="platform" onchange="updateModels()">
                <option value="FB_ANDROID">Facebook (Android)</option>
                <option value="FB_IOS">Facebook (iOS)</option>
                <option value="INSTAGRAM">Instagram</option>
                <option value="TIKTOK">TikTok</option>
                <option value="REDDIT">Reddit</option>
                <option value="CHROME">Chrome (Desktop)</option>
            </select>
        </div>

        <!-- Device Selection -->
        <div class="group">
            <label>DEVICE MODEL</label>
            <select id="deviceModel">
                <!-- Dynamically Populated -->
            </select>
        </div>

        <!-- Real Version Selection -->
        <div class="group">
            <label>APP VERSION (Real & 2026)</label>
            <select id="appVersion">
                <option value="510.0.0.50.120">510.0.0 (Latest 2025)</option>
                <option value="480.0.0.40.115">480.0.0 (Stable 2024)</option>
                <option value="650.0.0.80.200">650.0.0 (Pre-Alpha 2026)</option>
            </select>
        </div>

        <!-- OS Version Selection -->
        <div class="group">
            <label>OS VERSION</label>
            <select id="osVersion">
                <option value="15">Android 15 / iOS 18</option>
                <option value="14">Android 14 / iOS 17</option>
                <option value="16">Android 16 / iOS 19 (2026)</option>
            </select>
        </div>
    </div>

    <button onclick="generateManualUA()">GENERATE REAL USER AGENT</button>

    <div class="output-box">
        <button class="copy-btn" onclick="copyUA()">COPY</button>
        <div id="ua-display">Configure and click generate...</div>
    </div>

    <p class="ver-info">Note: All versions are mapped to real-world app release cycles.</p>
</div>

<script>
    // Real Device Database
    const deviceLibrary = {
        FB_ANDROID: [
            { name: "Samsung Galaxy S24 Ultra", model: "SM-S928B", brand: "samsung" },
            { name: "Samsung Galaxy S23 Ultra", model: "SM-S918B", brand: "samsung" },
            { name: "Google Pixel 9 Pro", model: "Pixel 9 Pro", brand: "google" },
            { name: "Xiaomi 14 Pro", model: "23127PN0CC", brand: "Xiaomi" },
            { name: "OnePlus 12", model: "CPH2581", brand: "OnePlus" }
        ],
        FB_IOS: [
            { name: "iPhone 15 Pro Max", model: "iPhone16,2", build: "21E219" },
            { name: "iPhone 14 Pro", model: "iPhone15,3", build: "20G75" },
            { name: "iPhone 16 Ultra (2026)", model: "iPhone17,1", build: "22A567" }
        ],
        INSTAGRAM: [
            { name: "iPhone 15 Pro", model: "iPhone16,1", build: "21E219" },
            { name: "Galaxy S24", model: "SM-S921B", brand: "samsung" }
        ],
        TIKTOK: [
            { name: "Samsung S24", model: "SM-S928B" },
            { name: "iPhone 15", model: "iPhone16,1" }
        ],
        REDDIT: [
            { name: "Pixel 8 Pro", model: "Pixel 8 Pro" },
            { name: "Galaxy S23", model: "SM-S911B" }
        ],
        CHROME: [
            { name: "Windows 11 PC", model: "Win64; x64" },
            { name: "MacOS Sonoma", model: "Macintosh; Intel Mac OS X 14_4" }
        ]
    };

    function updateModels() {
        const plat = document.getElementById('platform').value;
        const modelSelect = document.getElementById('deviceModel');
        modelSelect.innerHTML = "";
        
        deviceLibrary[plat].forEach(d => {
            let opt = document.createElement('option');
            opt.value = JSON.stringify(d);
            opt.innerText = d.name;
            modelSelect.appendChild(opt);
        });
    }

    updateModels(); // Initial load

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function generateManualUA() {
        const plat = document.getElementById('platform').value;
        const device = JSON.parse(document.getElementById('deviceModel').value);
        const appVer = document.getElementById('appVersion').value;
        const osVer = document.getElementById('osVersion').value;
        
        const bBV = rand(580000000, 680000000); // Random real build version
        const chromeV = `12${rand(2,6)}.0.0.0`; // Real Chrome Version
        
        let ua = "";

        if (plat === "FB_ANDROID") {
            ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${device.model} Build/UP1A.${rand(230000, 249999)}.011; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${chromeV} Mobile Safari/537.36 [FBAN/FB4A;FBAV/${appVer};FBBV/${bBV};FBDV/${device.model};FBMD/${device.brand};FBSN/Android;FBSV/${osVer};FBSS/3;FBID/phone;FBLC/en_US;FBOP/19;FBRV/${bBV}]`;
        } 
        else if (plat === "FB_IOS") {
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${osVer}_${rand(0,4)} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${device.build} [FBAN/FBIOS;FBAV/${appVer};FBBV/${bBV};FBDV/${device.model};FBMD/iPhone;FBSN/iOS;FBSV/${osVer};FBSS/3;FBID/phone;FBLC/en_US;FBOP/5;FBRV/${bBV}]`;
        }
        else if (plat === "INSTAGRAM") {
            ua = `Instagram ${appVer} (${plat.includes('IOS') ? 'iPhone' : 'Android'}; ${osVer}; en_US; en-US; scale=3.00; 1179x2556; ${device.model})`;
        }
        else if (plat === "TIKTOK") {
            ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${device.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeV} Mobile Safari/537.36 TikTok/${rand(33,38)}.0.0`;
        }
        else if (plat === "REDDIT") {
            ua = `Reddit/202${rand(4,6)}.01.0 (Android ${osVer}; ${device.model})`;
        }
        else {
            ua = `Mozilla/5.0 (${device.model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeV} Safari/537.36`;
        }

        document.getElementById('ua-display').innerText = ua;
    }

    function copyUA() {
        const text = document.getElementById('ua-display').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }
</script>

</body>
</html>
