<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite UA Generator - Secure Account System</title>
    <style>
        :root { --gh-dark: #0d1117; --gh-card: #161b22; --gh-blue: #2f81f7; --gh-green: #238636; --gh-border: #30363d; --gh-text: #e6edf3; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--gh-dark); color: var(--gh-text); margin: 0; padding: 0; }
        
        /* Auth Screen */
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #010409; }
        .auth-card { background: var(--gh-card); padding: 30px; border-radius: 10px; border: 1px solid var(--gh-border); width: 350px; text-align: center; }
        .auth-card h2 { color: var(--gh-blue); margin-bottom: 20px; }
        .auth-card input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid var(--gh-border); color: white; border-radius: 5px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 10px; background: var(--gh-blue); border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .toggle-link { font-size: 12px; color: #8b949e; cursor: pointer; display: block; margin-top: 15px; }

        /* Main App Interface */
        #app-screen { display: none; padding: 20px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--gh-card); padding: 10px 30px; border-bottom: 1px solid var(--gh-border); }
        .container { max-width: 1200px; margin: 20px auto; background: var(--gh-card); padding: 25px; border-radius: 12px; border: 1px solid var(--gh-border); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #8b949e; }
        select { background: #010409; color: white; border: 1px solid var(--gh-border); padding: 12px; border-radius: 6px; }
        
        .gen-btn { background: var(--gh-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .output-box { margin-top: 25px; background: #000; border: 1px solid var(--gh-border); padding: 20px; border-radius: 8px; position: relative; }
        #ua-display { font-family: monospace; font-size: 13px; color: #79c0ff; word-break: break-all; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--gh-blue); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        /* History */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin: 40px 0 15px; }
        #searchHistory { padding: 8px; width: 300px; background: #010409; color: white; border: 1px solid var(--gh-border); border-radius: 5px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #0d1117; }
        .history-table th, .history-table td { border: 1px solid var(--gh-border); padding: 12px; text-align: left; }
        .history-table th { background: #21262d; }
    </style>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-screen">
        <div class="auth-card" id="login-form">
            <h2>Sign In</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth('login')">Login</button>
            <span class="toggle-link" onclick="toggleAuth(false)">New here? Sign Up</span>
        </div>

        <div class="auth-card" id="signup-form" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="reg-user" placeholder="Choose Username">
            <input type="password" id="reg-pass" placeholder="Choose Password">
            <button class="auth-btn" style="background: var(--gh-green);" onclick="handleAuth('signup')">Create Account</button>
            <span class="toggle-link" onclick="toggleAuth(true)">Already have an account? Login</span>
        </div>
    </div>

    <!-- Main Application Screen -->
    <div id="app-screen">
        <div class="navbar">
            <div style="font-weight: bold; color: var(--gh-blue);">Elite UA Pro</div>
            <div>
                <span id="welcome-user" style="margin-right: 20px; font-size: 14px;"></span>
                <button onclick="logout()" style="background: #f85149; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Logout</button>
            </div>
        </div>

        <div class="container">
            <h1>🚀 Generator & Secure History</h1>
            <div class="grid">
                <div class="field">
                    <label>Platform</label>
                    <select id="platform">
                        <option value="CHROME">Chrome (134-146)</option>
                        <option value="FACEBOOK">Facebook</option>
                        <option value="INSTAGRAM">Instagram</option>
                        <option value="TIKTOK">TikTok</option>
                    </select>
                </div>
                <div class="field">
                    <label>Device Category</label>
                    <select id="deviceCat">
                        <option value="MOBILE">Mobile (Android Brands)</option>
                        <option value="IOS">Apple (iPhone)</option>
                        <option value="WINDOWS">Windows (8.1, 10, 11)</option>
                    </select>
                </div>
            </div>

            <button class="gen-btn" onclick="generateUniqueUA()">GENERATE & SAVE TO HISTORY</button>

            <div class="output-box">
                <button class="copy-btn" onclick="copyUA()">COPY</button>
                <div id="ua-display">UA will appear here...</div>
            </div>

            <div class="history-header">
                <h3>📜 Your Private History</h3>
                <input type="text" id="searchHistory" placeholder="Search saved UAs..." onkeyup="renderHistory()">
            </div>
            <table class="history-table">
                <thead>
                    <tr><th>Time</th><th>Platform</th><th>User-Agent</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

<script>
    // --- AUTH LOGIC ---
    let currentUser = null;

    function toggleAuth(showLogin) {
        document.getElementById('login-form').style.display = showLogin ? 'block' : 'none';
        document.getElementById('signup-form').style.display = showLogin ? 'none' : 'block';
    }

    function handleAuth(type) {
        const users = JSON.parse(localStorage.getItem('ua_users') || '{}');
        if (type === 'signup') {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            if (!user || !pass) return alert("Fill all fields");
            if (users[user]) return alert("Username exists");
            users[user] = { pass: pass, history: [] };
            localStorage.setItem('ua_users', JSON.stringify(users));
            alert("Signup Success! Please Login.");
            toggleAuth(true);
        } else {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            if (users[user] && users[user].pass === pass) {
                currentUser = user;
                startApp();
            } else { alert("Invalid credentials"); }
        }
    }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('welcome-user').innerText = "Logged in as: " + currentUser;
        renderHistory();
    }

    function logout() { location.reload(); }

    // --- GENERATOR LOGIC ---
    const androidPool = [
        { b: "Samsung", m: "SM-S928B", os: "14", build: "UP1A.231005.007" },
        { b: "Xiaomi", m: "23127PN0CC", os: "14", build: "UKQ1.230804.001" },
        { b: "Google", m: "Pixel 9 Pro", os: "15", build: "AD1A.240511.001" },
        { b: "OnePlus", m: "CPH2581", os: "14", build: "UKQ1.230917.001" }
    ];

    function generateUniqueUA() {
        const plat = document.getElementById('platform').value;
        const cat = document.getElementById('deviceCat').value;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        
        let ua = "";
        const cVer = `${rand(134, 146)}.0.${rand(6000, 7000)}.${rand(10, 150)}`;

        if (cat === "MOBILE") {
            const dev = androidPool[rand(0, androidPool.length - 1)];
            if (plat === "CHROME") ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.m}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Mobile Safari/537.36`;
            else ua = `Mozilla/5.0 (Linux; Android ${dev.os}; ${dev.m} Build/${dev.build}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${cVer} Mobile Safari/537.36 [FBAN/FB4A;FBAV/${rand(400,500)}.0.0;FBBV/${rand(500000000,600000000)};FBDV/${dev.m};]`;
        } else if (cat === "IOS") {
            ua = `Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/21E219 [FBAN/FBIOS;FBAV/450.0.0;FBBV/580000000;]`;
        } else {
            ua = `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36`;
        }

        document.getElementById('ua-display').innerText = ua;
        saveUA(ua, plat);
    }

    function saveUA(ua, platform) {
        const users = JSON.parse(localStorage.getItem('ua_users'));
        const time = new Date().toLocaleString();
        users[currentUser].history.unshift({ time, platform, ua });
        localStorage.setItem('ua_users', JSON.stringify(users));
        renderHistory();
    }

    function renderHistory() {
        const users = JSON.parse(localStorage.getItem('ua_users'));
        const search = document.getElementById('searchHistory').value.toLowerCase();
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        
        users[currentUser].history.filter(i => i.ua.toLowerCase().includes(search)).forEach(i => {
            body.innerHTML += `<tr><td>${i.time}</td><td>${i.platform}</td><td>${i.ua}</td></tr>`;
        });
    }

    function copyUA() {
        navigator.clipboard.writeText(document.getElementById('ua-display').innerText);
        alert("Copied!");
    }
</script>
</body>
</html>
