        .gen-btn:hover { background: #2ea043; transform: translateY(-2px); }
        .output-box { margin-top: 25px; background: #000; border: 1px solid var(--gh-border); padding: 20px; border-radius: 8px; position: relative; min-height: 60px; }
        #ua-display { font-family: 'Consolas', monospace; font-size: 13px; color: #79c0ff; word-break: break-all; line-height: 1.5; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--gh-blue); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        .history-table th, .history-table td { border: 1px solid var(--gh-border); padding: 12px; text-align: left; }
        .history-table th { background: #21262d; color: var(--gh-blue); }
